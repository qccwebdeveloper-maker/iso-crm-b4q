# Serves the React build and reverse-proxies the API to the backend container.
# This replaces the dev-only src/setupProxy.js — everything is one origin, so no CORS.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router: send unknown routes to index.html (SPA fallback)
    location / {
        try_files $uri /index.html;
    }

    # API + uploaded-file links go to the backend container (service name "backend")
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /uploads/ {
        proxy_pass http://backend:5000;
    }

    # Cache static assets aggressively
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
